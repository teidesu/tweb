appId: desu.inutweb
productName: inutweb
copyright: abolish copyright law

directories:
  output: release

files:
  - dist/**/*
  - dist-electron/**/*
  - package.json

# native addon must live outside the asar to be require()-able
asarUnpack:
  - dist-electron/native/**

protocols:
  - name: Telegram
    schemes:
      - tg

mac:
  category: public.app-category.social-networking
  icon: assets/desktop-icon/icon.icns
  target:
    - dmg
  hardenedRuntime: true

win:
  icon: assets/desktop-icon/icon.png
  target:
    - nsis

linux:
  category: Network
  icon: assets/desktop-icon/icon.png
  target:
    - AppImage

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
