appId: desu.inutweb
productName: inutweb
copyright: abolish copyright law

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - dist-electron/**/*
  - package.json

# native addon must live outside the asar to be require()-able
asarUnpack:
  - dist-electron/native/**

protocols:
  - name: Telegram
    schemes:
      - tg

mac:
  category: public.app-category.social-networking
  target:
    - dmg
  hardenedRuntime: true

win:
  target:
    - nsis

linux:
  category: Network
  target:
    - AppImage

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
